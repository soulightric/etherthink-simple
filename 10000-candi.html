<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10.000 Candi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-bright: #f0d070;
    --stone: #8b7355;
    --stone-dark: #3d2e1e;
    --stone-light: #c4a882;
    --sky-top: #0a0510;
    --sky-mid: #1a0a2e;
    --sky-low: #2d1b00;
    --mist: rgba(180, 140, 80, 0.08);
  }

  body {
    background: var(--sky-top);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Cinzel', serif;
    cursor: crosshair;
  }

  #sky {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, #2d1b4e 0%, #1a0a2e 40%, #0a0510 100%);
    z-index: 0;
  }

  #stars {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  #moon {
    position: fixed;
    top: 60px;
    right: 120px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff8e0, #f0d070 40%, #c9a84c);
    box-shadow: 0 0 40px 15px rgba(201,168,76,0.4), 0 0 100px 40px rgba(201,168,76,0.15);
    z-index: 2;
    animation: moonPulse 6s ease-in-out infinite;
  }

  @keyframes moonPulse {
    0%,100% { box-shadow: 0 0 40px 15px rgba(201,168,76,0.4), 0 0 100px 40px rgba(201,168,76,0.15); }
    50% { box-shadow: 0 0 60px 25px rgba(201,168,76,0.6), 0 0 140px 60px rgba(201,168,76,0.2); }
  }

  #fog {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 220px;
    background: linear-gradient(to top, rgba(40,25,5,0.95) 0%, rgba(40,25,5,0.6) 40%, transparent 100%);
    z-index: 10;
    pointer-events: none;
  }

  #canvas {
    position: fixed;
    inset: 0;
    z-index: 5;
  }

  #hud {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
  }

  #hud h1 {
    font-size: clamp(1.2rem, 3vw, 2rem);
    font-weight: 900;
    letter-spacing: 0.3em;
    color: var(--gold-bright);
    text-shadow: 0 0 30px rgba(201,168,76,0.8), 0 0 60px rgba(201,168,76,0.4);
    text-transform: uppercase;
  }

  #counter-display {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: clamp(0.8rem, 1.5vw, 1rem);
    color: rgba(201,168,76,0.7);
    letter-spacing: 0.2em;
    margin-top: 6px;
  }

  #counter-num {
    font-family: 'Cinzel', serif;
    font-style: normal;
    font-weight: 700;
    font-size: 1.4em;
    color: var(--gold-bright);
    text-shadow: 0 0 20px rgba(240,208,112,0.9);
    display: inline-block;
    min-width: 6ch;
    text-align: center;
  }

  #info {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    color: rgba(201,168,76,0.4);
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
  }

  #progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(to right, transparent, var(--gold), var(--gold-bright), var(--gold));
    z-index: 30;
    box-shadow: 0 0 10px var(--gold);
    transition: width 0.1s linear;
  }
</style>
</head>
<body>

<div id="sky"></div>
<canvas id="stars"></canvas>
<div id="moon"></div>
<canvas id="canvas"></canvas>
<div id="fog"></div>

<div id="hud">
  <h1>Sepuluh Ribu Candi</h1>
  <div id="counter-display">
    <span id="counter-num">0</span> &nbsp;candi telah berdiri
  </div>
</div>

<div id="info">klik untuk mempersembahkan candi &bull; gulir untuk zoom</div>
<div id="progress-bar" id="progress-bar" style="width:0%"></div>

<script>
// ─── Stars ───────────────────────────────────────────────────────────────────
const starCanvas = document.getElementById('stars');
const sCtx = starCanvas.getContext('2d');
starCanvas.width = window.innerWidth;
starCanvas.height = window.innerHeight;
const STARS = Array.from({length: 300}, () => ({
  x: Math.random() * starCanvas.width,
  y: Math.random() * starCanvas.height * 0.65,
  r: Math.random() * 1.5 + 0.3,
  a: Math.random(),
  speed: Math.random() * 0.008 + 0.002
}));
function drawStars(t) {
  sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  STARS.forEach(s => {
    s.a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.x));
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(255, 248, 200, ${s.a})`;
    sCtx.fill();
  });
}

// ─── Main Canvas ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const W = canvas.width, H = canvas.height;
const TARGET = 10000;
let temples = [];
let rendered = 0;
let zoom = 1.0;
let panX = 0;
let animating = false;
let spawnQueue = 0;
let lastTime = 0;
let autoSpawn = true;

// ─── Temple Blueprint ─────────────────────────────────────────────────────────
// Each temple is a Prambanan-style silhouette: tiered spire
function makeTemple(x, y, scale, variant) {
  return {
    x, y, scale,
    variant: variant || Math.floor(Math.random() * 4),
    age: 0,
    born: performance.now(),
    alpha: 0,
    glow: Math.random() * 0.5 + 0.3,
    glowPhase: Math.random() * Math.PI * 2
  };
}

// Draw a single Prambanan-style candi silhouette
function drawCandi(ctx, t, scale, variant, alpha, glowPhase) {
  ctx.save();
  ctx.globalAlpha = alpha;

  const tier = [
    {w: 1.0, h: 0.18},  // base
    {w: 0.78, h: 0.14},
    {w: 0.60, h: 0.12},
    {w: 0.44, h: 0.10},
    {w: 0.30, h: 0.09},
    {w: 0.20, h: 0.08},
    {w: 0.12, h: 0.12}, // spire
  ];

  const totalH = tier.reduce((s,t) => s + t.h, 0);
  const bw = scale;
  const bh = scale * 2.2;

  // glow behind
  const glowA = 0.08 + 0.06 * Math.sin(glowPhase);
  const grd = ctx.createRadialGradient(0, -bh * 0.5, 0, 0, -bh * 0.5, bh * 0.8);
  grd.addColorStop(0, `rgba(201,168,76,${glowA})`);
  grd.addColorStop(1, 'rgba(201,168,76,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(-bh * 0.8, -bh * 1.1, bh * 1.6, bh * 1.2);

  let cy = 0;

  // stone colors
  const stoneGrad = ctx.createLinearGradient(-bw * 0.5, -bh, bw * 0.5, 0);
  if (variant === 0) {
    stoneGrad.addColorStop(0, '#5a4228');
    stoneGrad.addColorStop(0.4, '#8b6840');
    stoneGrad.addColorStop(1, '#3d2e1e');
  } else if (variant === 1) {
    stoneGrad.addColorStop(0, '#4a3a2a');
    stoneGrad.addColorStop(0.5, '#7a6048');
    stoneGrad.addColorStop(1, '#2d1f10');
  } else if (variant === 2) {
    stoneGrad.addColorStop(0, '#6a5535');
    stoneGrad.addColorStop(0.5, '#a08050');
    stoneGrad.addColorStop(1, '#4a3520');
  } else {
    stoneGrad.addColorStop(0, '#504030');
    stoneGrad.addColorStop(0.5, '#906838');
    stoneGrad.addColorStop(1, '#352515');
  }

  tier.forEach((t, i) => {
    const tw = bw * t.w;
    const th = bh * t.h;
    const x = -tw / 2;
    const y = cy - th;

    ctx.fillStyle = stoneGrad;
    ctx.fillRect(x, y, tw, th);

    // edge highlight
    ctx.strokeStyle = `rgba(201,168,76,${0.12 + 0.06 * Math.sin(glowPhase + i)})`;
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x, y, tw, th);

    // decorative notches on lower tiers
    if (i < 5 && tw > 4) {
      ctx.fillStyle = `rgba(0,0,0,0.3)`;
      const notchW = tw * 0.06;
      const notchH = th * 0.35;
      const notchY = y + th - notchH;
      for (let n = 0; n < 3; n++) {
        const nx = x + tw * (0.2 + n * 0.3) - notchW / 2;
        ctx.fillRect(nx, notchY, notchW, notchH);
      }
    }

    cy -= th;
  });

  // finial / ratna at top
  ctx.beginPath();
  ctx.arc(0, cy - scale * 0.06, scale * 0.06, 0, Math.PI * 2);
  const goldGrd = ctx.createRadialGradient(-scale*0.02, cy - scale*0.08, 0, 0, cy - scale*0.06, scale*0.06);
  goldGrd.addColorStop(0, '#fff0a0');
  goldGrd.addColorStop(0.5, '#c9a84c');
  goldGrd.addColorStop(1, '#8a6020');
  ctx.fillStyle = goldGrd;
  ctx.fill();

  ctx.restore();
}

// ─── World Layout ─────────────────────────────────────────────────────────────
// Grid of temples across a wide virtual world
const COLS = 200;
const ROWS = 50;
const CELL_W = 28;
const CELL_H = 22;
const WORLD_W = COLS * CELL_W;
const WORLD_H = ROWS * CELL_H;

// Generate positions for all 10000 temples
const positions = [];
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const jx = (Math.random() - 0.5) * 8;
    const jy = (Math.random() - 0.5) * 4;
    positions.push({
      x: c * CELL_W + CELL_W / 2 + jx,
      y: r * CELL_H + CELL_H / 2 + jy,
      scale: 3 + Math.random() * 5,
      variant: Math.floor(Math.random() * 4)
    });
  }
}
// Shuffle for random spawn order
for (let i = positions.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [positions[i], positions[j]] = [positions[j], positions[i]];
}

const counterEl = document.getElementById('counter-num');
const progressBar = document.getElementById('progress-bar');

function updateCounter() {
  counterEl.textContent = rendered.toLocaleString('id-ID');
  const pct = (rendered / TARGET) * 100;
  progressBar.style.width = pct + '%';
}

// Camera: project world coords to screen
function worldToScreen(wx, wy) {
  // Perspective: rows closer to bottom appear larger
  const perspRow = wy / WORLD_H; // 0 (top/far) to 1 (bottom/near)
  const perspScale = 0.12 + perspRow * 0.88;

  // Flatten world into a horizon-perspective view
  const screenCX = W / 2 + panX;
  const horizonY = H * 0.32;
  const groundH = H - horizonY;

  const sx = screenCX + (wx - WORLD_W / 2) * perspScale * zoom;
  const sy = horizonY + perspRow * groundH * zoom;
  return { sx, sy, scale: perspScale * zoom };
}

let viewportShift = 0; // slowly pan right over time

// ─── Render ──────────────────────────────────────────────────────────────────
function render(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  const t = timestamp / 1000;

  // Auto-pan
  viewportShift += dt * 0.002;
  panX = Math.sin(viewportShift * 0.08) * W * 0.3;

  // Auto-spawn
  if (autoSpawn && rendered < TARGET) {
    const spawnRate = Math.min(8, Math.floor(rendered / 500) + 1);
    for (let i = 0; i < spawnRate && rendered < TARGET; i++) {
      const p = positions[rendered];
      temples.push(makeTemple(p.x, p.y, p.scale, p.variant));
      rendered++;
    }
    updateCounter();
  }

  // Animate glow phases
  temples.forEach(tm => {
    tm.glowPhase += 0.015;
    if (tm.alpha < 1) {
      tm.alpha = Math.min(1, tm.alpha + 0.04);
    }
  });

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Gradient ground
  const ground = ctx.createLinearGradient(0, H * 0.32, 0, H);
  ground.addColorStop(0, 'rgba(20,12,3,0.0)');
  ground.addColorStop(0.3, 'rgba(30,18,5,0.6)');
  ground.addColorStop(1, 'rgba(15,8,2,0.95)');
  ctx.fillStyle = ground;
  ctx.fillRect(0, H * 0.32, W, H);

  // Draw temples sorted by y (back to front = far to near)
  const visible = temples.filter(tm => {
    const { sx } = worldToScreen(tm.x, tm.y);
    return sx > -60 && sx < W + 60;
  });

  visible.sort((a, b) => a.y - b.y);

  visible.forEach(tm => {
    const { sx, sy, scale } = worldToScreen(tm.x, tm.y);
    ctx.save();
    ctx.translate(sx, sy);
    drawCandi(ctx, t, tm.scale * scale, tm.variant, tm.alpha, tm.glowPhase);
    ctx.restore();
  });

  // Atmospheric haze layers
  for (let layer = 0; layer < 5; layer++) {
    const ly = H * (0.3 + layer * 0.06);
    const hazeGrd = ctx.createLinearGradient(0, ly - 8, 0, ly + 8);
    hazeGrd.addColorStop(0, 'transparent');
    hazeGrd.addColorStop(0.5, `rgba(30, 20, 5, ${0.04 + layer * 0.03})`);
    hazeGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = hazeGrd;
    ctx.fillRect(0, ly - 8, W, 16);
  }

  drawStars(t);
  requestAnimationFrame(render);
}

// ─── Interaction ──────────────────────────────────────────────────────────────
canvas.addEventListener('click', (e) => {
  // Manually spawn a burst on click
  for (let i = 0; i < 20 && rendered < TARGET; i++) {
    const p = positions[rendered];
    temples.push(makeTemple(p.x, p.y, p.scale, p.variant));
    rendered++;
  }
  updateCounter();
});

canvas.addEventListener('wheel', (e) => {
  zoom = Math.max(0.4, Math.min(3, zoom - e.deltaY * 0.001));
}, { passive: true });

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
});

// ─── Start ───────────────────────────────────────────────────────────────────
updateCounter();
requestAnimationFrame(render);
</script>
</body>
</html>
