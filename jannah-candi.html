<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10000 Candi</title>
<style>
  body {
    margin: 0;
    background: #f5f0e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
  }

  h1 {
    font-size: 2rem;
    color: #5a3a1a;
    margin-bottom: 10px;
    text-align: center;
  }

  #status {
    font-size: 1.2rem;
    color: #8b5e2a;
    margin-bottom: 20px;
  }

  #jumlah {
    font-weight: bold;
    color: #c0392b;
  }

  canvas {
    border: 3px solid #8b5e2a;
    border-radius: 8px;
    background: #fff;
    max-width: 95vw;
  }
</style>
</head>
<body>

<h1>🛕 10.000 Candi</h1>
<div id="status">Sedang membuat: <span id="jumlah">0</span> / 10.000 candi</div>
<canvas id="c" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const jumlahEl = document.getElementById('jumlah');

const TOTAL = 10000;
let count = 0;

// Ukuran grid
const COLS = 100;
const ROWS = 100;
const CW = canvas.width / COLS;   // lebar per cell
const CH = canvas.height / ROWS;  // tinggi per cell

function drawCandi(x, y, w, h) {
  const cx = x + w / 2;

  // Warna batu (sedikit variasi)
  const shade = 120 + Math.floor(Math.random() * 60);
  const color = `rgb(${shade}, ${shade - 20}, ${shade - 40})`;

  ctx.fillStyle = color;

  // Badan bawah
  ctx.fillRect(x + w * 0.1, y + h * 0.55, w * 0.8, h * 0.45);

  // Badan tengah
  ctx.fillRect(x + w * 0.2, y + h * 0.38, w * 0.6, h * 0.22);

  // Badan atas
  ctx.fillRect(x + w * 0.28, y + h * 0.24, w * 0.44, h * 0.18);

  // Menara kecil
  ctx.fillRect(x + w * 0.34, y + h * 0.12, w * 0.32, h * 0.16);

  // Puncak segitiga
  ctx.beginPath();
  ctx.moveTo(cx, y);
  ctx.lineTo(x + w * 0.28, y + h * 0.14);
  ctx.lineTo(x + w * 0.72, y + h * 0.14);
  ctx.closePath();
  ctx.fill();
}

function spawnBatch() {
  const batch = 50;
  for (let i = 0; i < batch && count < TOTAL; i++) {
    const col = count % COLS;
    const row = Math.floor(count / COLS);
    const x = col * CW;
    const y = row * CH;
    drawCandi(x, y, CW, CH);
    count++;
  }

  jumlahEl.textContent = count.toLocaleString('id-ID');

  if (count < TOTAL) {
    requestAnimationFrame(spawnBatch);
  } else {
    document.getElementById('status').innerHTML =
      '✅ <strong>10.000 candi selesai dibuat!</strong>';
  }
}

spawnBatch();
</script>
</body>
</html>
