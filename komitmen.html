<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komitmen Kita</title>
    
    <!-- Open Graph -->
    <meta property="og:title" content="Komitmen Kita Sampai Menikah">
    <meta property="og:description" content="Dengan ini kita komitmen sampai menikah nanti">
    <meta property="og:image" content="/images.jpg">
    <meta property="og:url" content="https://etherthink.cujud.xyz/komitmen">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Komitmen Kita Sampai Menikah">
    <meta name="twitter:description" content="Dengan ini kita komitmen sampai menikah nanti">

    <link rel="shortcut icon" href="https://stickershop.line-scdn.net/stickershop/v1/product/1908334/LINEStorePC/main.png?v=1" type="image/x-icon">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 20px 15px;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #bae6fd 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e40af;
        }
        
        .container {
            max-width: 380px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.25);
            overflow: hidden;
            border: 12px solid #3b82f6;
        }
        
        header {
            background: linear-gradient(45deg, #3b82f6, #60a5fa);
            padding: 50px 30px 40px;
            text-align: center;
            color: white;
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 15px;
            animation: float 3s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        h1 {
            font-size: 1.85rem;
            margin: 0;
            line-height: 1.3;
        }
        
        .content {
            padding: 40px 30px;
            text-align: center;
        }
        
        .photo {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 35px;
            border: 6px solid #dbeafe;
        }
        
        .main-text {
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 40px;
        }
        
        .button {
            background: #3b82f6;
            color: white;
            padding: 16px 40px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin: 10px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            transition: all 0.3s;
            border-radius: 5px;
        }
        
        .button:hover {
            transform: translateY(-4px);
            background: #2563eb;
        }

        .fikly {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .fikly:hover {
            color: #001645;
        }
        
        footer {
            padding: 25px;
            background: #f0f9ff;
            font-size: 0.95rem;
            color: #3b82f6;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SEBUAH KOMITMEN</h1>
        </header>
        
        <div class="content">
            <!-- Ganti dengan foto kalian -->
            <img src="https://media.tenor.com/FaBUarvMgUoAAAAM/michi-cat.gif" alt="Kita" class="photo">
            
            <div class="main-text">
                Dengan ini kita komitmen<br>
                sampai wedding nanti, kamu udah jadi punyaku hehehe.
            </div>
            <a href="#" onclick="alert('Komitmen kita sudah tercatat di sini. Sampai hari pernikahan nanti!')" 
            class="button">
                Simpan Janji
            </a>
        </div>
        
        <footer>
            Dibuat oleh <a class="fikly" href="http://fikly.cujud.xyz" target="_blank">Fikly</a> • Parepare, 2026
        </footer>
    </div>
</body>
</html>
